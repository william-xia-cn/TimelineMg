name: Build TimeWhere macOS Widget

on:
  workflow_dispatch:

jobs:
  build-widget:
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build unsigned WidgetKit extension
        run: npm run macos:widget:build
