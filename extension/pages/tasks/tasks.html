<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeWhere - Planner</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <!-- Local Fonts -->
    <link rel="stylesheet" href="../../shared/styles/fonts.css">
    <!-- Local Icons -->
    <link rel="stylesheet" href="../../shared/styles/icons.css">
    <!-- Page Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-layout">
        <!-- 1. Primary Sidebar (64px) -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon"><span class="material-symbols-outlined">change_history</span></div>
            </div>
            <nav class="nav-menu">
                <a href="../focus/focus.html" class="nav-item" title="Dashboard"><span class="material-symbols-outlined">grid_view</span></a>
                <a href="tasks.html" class="nav-item active" title="Tasks"><span class="material-symbols-outlined">task</span></a>
                <a href="../calendar/calendar.html" class="nav-item" title="Calendar"><span class="material-symbols-outlined">calendar_today</span></a>
                <a href="#" class="nav-item" title="More"><span class="material-symbols-outlined">apps</span></a>
            </nav>
            <div class="sidebar-bottom">
                <a href="../settings/settings.html" class="nav-item" title="Settings"><span class="material-symbols-outlined">settings</span></a>
                <img src="../../shared/images/avatar-default.png" alt="Avatar" class="user-avatar">
            </div>
        </aside>

        <!-- 2. Context Sidebar (240px) -->
        <aside class="context-sidebar">
            <div class="sidebar-header">
                <button class="btn-create-plan" id="btnCreatePlan">
                    <span class="material-symbols-outlined">add</span> Create a plan
                </button>
            </div>
            <div class="sidebar-content custom-scrollbar">
                <nav class="context-menu">
                    <a href="#" class="context-item" id="navMyDay"><span class="material-symbols-outlined">wb_sunny</span> My day</a>
                    <a href="#" class="context-item" id="navMyTasks"><span class="material-symbols-outlined">assignment</span> My Tasks</a>

                    <div class="menu-divider"></div>
                    <div class="section-title">PLANS <span class="material-symbols-outlined">expand_more</span></div>
                </nav>
                <div id="plansList" class="plans-list">
                    <!-- Dynamic: plan links rendered by sidebar.js -->
                </div>
            </div>
        </aside>

        <!-- 3. Main Content -->
        <main class="main-content glass-panel">
            <header class="board-header">
                <div class="header-breadcrumb">
                    <span class="bc-parent">My plans</span>
                    <span class="bc-sep">/</span>
                    <span class="bc-current">Tasks</span>
                </div>
                <div class="header-actions">
                    <div class="search-bar">
                        <span class="material-symbols-outlined">search</span>
                        <input type="text" id="searchInput" placeholder="Search tasks...">
                    </div>
                    <button class="icon-btn" id="btnFilter"><span class="material-symbols-outlined">filter_list</span> Filter</button>
                    <button class="icon-btn" id="btnGroupBy"><span class="material-symbols-outlined">group_work</span> Group by: Due date</button>
                </div>
            </header>

            <nav class="view-tabs">
                <button class="btn-tab active" data-view="board">Board</button>
                <button class="btn-tab" data-view="list">List</button>
            </nav>

            <section id="kanbanBoard" class="kanban-board custom-scrollbar">
                <!-- Dynamic: columns rendered by board.js -->
            </section>

            <!-- Empty state when no plan selected -->
            <div id="noPlanState" class="no-plan-state" style="display:none">
                <span class="material-symbols-outlined">playlist_add</span>
                <h3>No plan selected</h3>
                <p>Select a plan from the sidebar or create a new one.</p>
                <button class="btn-create-plan-alt" id="btnCreatePlanAlt">
                    <span class="material-symbols-outlined">add</span> Create a plan
                </button>
            </div>
        </main>

        <!-- 4. Task Detail Panel (slide-in from right) -->
        <aside id="taskDetailPanel" class="task-detail-panel">
            <!-- Dynamic: rendered by detail-panel.js -->
        </aside>
    </div>

    <!-- Modal Overlay -->
    <div id="modalOverlay" class="modal-overlay">
        <!-- Dynamic: dialog content rendered by dialogs.js -->
    </div>

    <!-- Scripts -->
    <script src="../../shared/js/icons.js"></script>
    <script src="../../shared/js/dexie.js"></script>
    <script src="../../shared/js/db.js"></script>
    <script src="state.js"></script>
    <script src="board.js"></script>
    <script src="sidebar.js"></script>
    <script src="detail-panel.js"></script>
    <script src="dialogs.js"></script>
    <script src="script.js"></script>
</body>
</html>
