<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeWhere</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <!-- Local Fonts -->
    <link rel="stylesheet" href="../shared/styles/fonts.css">
    <!-- Local Icons -->
    <link rel="stylesheet" href="../shared/styles/icons.css">
    <!-- Popup Styles -->
    <link rel="stylesheet" href="popup.css">
</head>
<body class="popup-body">
    <div class="popup-container">
        <!-- Header -->
        <header class="popup-header">
            <div class="logo-row">
                <div class="logo-icon"><span class="material-symbols-outlined">change_history</span></div>
                <span class="app-name">TimeWhere</span>
            </div>
            <div class="current-time" id="currentTime">--:--</div>
        </header>

        <!-- 当前任务区 -->
        <section class="current-task-section">
            <div class="section-label">
                <span class="material-symbols-outlined">play_circle</span>
                <span>当前任务</span>
            </div>
            <div class="task-card">
                <div class="task-placeholder">
                    <span class="material-symbols-outlined">add_circle</span>
                    <span>暂无进行中的任务</span>
                </div>
            </div>
        </section>

        <!-- 快捷操作区 -->
        <section class="quick-actions">
                <button class="action-btn" id="btnStart">
                    <span class="material-symbols-outlined">play_arrow</span>
                    <span>开始</span>
                </button>
                <button class="action-btn primary" id="btnComplete">
                    <span class="material-symbols-outlined">check</span>
                    <span>完成</span>
                </button>
                <button class="action-btn" id="btnDelay">
                    <span class="material-symbols-outlined">schedule</span>
                    <span>延后</span>
                </button>
        </section>

        <!-- 统计概览 -->
        <section class="stats-section">
            <div class="stat-card">
                <span class="stat-num">0</span>
                <span class="stat-label">今日完成</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-card">
                <span class="stat-num">0</span>
                <span class="stat-label">待办任务</span>
            </div>
        </section>

        <!-- 底部导航 -->
        <footer class="popup-footer">
            <button class="footer-btn" id="btnSettings">
                <span class="material-symbols-outlined">settings</span>
                <span>设置</span>
            </button>
            <button class="footer-btn highlight" id="btnOpenFull">
                <span class="material-symbols-outlined">open_in_new</span>
                <span>打开完整页面</span>
            </button>
        </footer>
    </div>

    <!-- Icons Library -->
    <script src="../shared/js/icons.js"></script>
    <!-- Dexie.js -->
    <script src="../shared/js/dexie.js"></script>
    <!-- Database -->
    <script src="../shared/js/db.js"></script>
    <!-- Popup Script -->
    <script src="popup.js"></script>
</body>
</html>
